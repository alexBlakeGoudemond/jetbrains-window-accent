<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Window Accent - Dodge All The Accents</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #050b16;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: "Segoe UI", sans-serif;
            overflow: hidden;
        }

        #gameWrap {
            position: relative;
        }

        canvas {
            background: linear-gradient(#071426, #02050a);
            border-radius: 18px;
            box-shadow: 0 0 40px rgba(0, 120, 255, .35);
            display: block;
        }

        #hint {
            position: fixed;
            bottom: 15px;
            opacity: .6;
            font-size: 13px;
        }

        #docsBtn {
            display: none;
            position: absolute;
            left: 50%;
            top: 430px;
            transform: translateX(-50%);
            padding: 10px 20px;
            font-size: 15px;
            font-family: "Segoe UI", sans-serif;
            color: white;
            background: #0078d4;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 120, 255, .5);
        }

        #docsBtn:hover {
            background: #1a8ae6;
        }
    </style>

</head>

<body>

<div id="gameWrap">
    <canvas id="game" width="800" height="600"></canvas>
    <button id="docsBtn">📖 Back to Docs</button>
</div>

<div id="hint">
    ← → Move &nbsp; | &nbsp; ↓ Speed Boost &nbsp; | &nbsp; SPACE Start / Pause &nbsp; | &nbsp; Secret: ↑ ↑ ↓ ↓ ← → ← → B A
</div>

<script>

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const docsBtn = document.getElementById("docsBtn");
    const DOCS_URL = "https://alexblakegoudemond.github.io/jetbrains-window-accent/contributing/";

    docsBtn.addEventListener("click", () => {
        window.location.href = DOCS_URL;
    });

    const greetings = [
        ["Hej", "#006aa7"],             // Swedish
        ["Hei", "#00205b"],             // Norwegian
        ["Hei", "#ffffff"],             // Finnish
        ["Hej", "#c60c30"],             // Danish
        ["Ahoj", "#11457e"],            // Czech / Slovak
        ["Zdravo", "#0c4076"],          // Serbian / Croatian
        ["Bok", "#ff0000"],             // Croatian (informal)
        ["Szia", "#436f4d"],            // Hungarian
        ["Cześć", "#dc143c"],           // Polish
        ["Bună", "#002b7f"],            // Romanian
        ["Привет", "#aaaaaa"],          // Russian
        ["Здравей", "#00966e"],         // Bulgarian
        ["Γεια σου", "#0d5eaf"],        // Greek
        ["שלום", "#0038b8"],            // Hebrew
        ["السلام عليكم", "#006c35"],    // Arabic
        ["سلام", "#239f40"],            // Persian
        ["ਸਤ ਸ੍ਰੀ ਅਕਾਲ", "#ff9933"],     // Punjabi
        ["Kem cho?", "#138808"],        // Gujarati
        ["Vanakkam", "#ff9933"],        // Tamil
        ["Ayubowan", "#8d153a"],        // Sinhala
        ["Halo", "#ce1126"],            // Indonesian
        ["Kamusta", "#0038a8"],         // Filipino
        ["Sawasdee", "#2d2a4a"],        // Thai
        ["Mingalaba", "#34b233"],       // Burmese
        ["Chào bạn", "#da251d"],        // Vietnamese (Hi, friend)
        ["Habari", "#1eb53a"],          // Swahili
        ["Jambo", "#000000"],           // Swahili (tourist-friendly)
        ["Molo", "#007749"],            // isiXhosa
        ["Dumela", "#75aadb"],          // Setswana / Sesotho
        ["Avuxeni", "#009739"],         // Xitsonga
        ["Thobela", "#007a4d"],         // Sepedi
        ["Lotjhani", "#00a859"],        // siSwati
        ["Sanibonani", "#007749"],      // isiZulu (plural)
        ["Yebo", "#ffb81c"],            // isiZulu ("Yes", often used conversationally)
        ["Shalom", "#0038b8"],          // Hebrew greeting/farewell
        ["Aloha", "#c8102e"],           // Hawaiian
        ["Kia ora", "#00247d"],         // Māori
        ["Talofa", "#002b7f"],          // Samoan
        ["Bula", "#68bfe5"],            // Fijian
        ["Ia ora na", "#dc143c"],       // Tahitian
        ["Tēnā koe", "#00247d"],        // Māori (formal)
        ["Kumusta", "#0038a8"],         // Filipino (informal)
        ["Salam", "#239f40"],           // Persian (informal)
        ["Namaste", "#ff9933"],         // Hindi
        ["Salaam", "#006c35"],          // Arabic (informal)
        ["Sannu", "#138808"],           // Hausa
        ["Selamat siang", "#ce1126"],   // Indonesian (Good afternoon)
        // Fun ones below
        ["Hello, World!", "#4caf50"],
        ["Ahoy!", "#1565c0"],
        ["👋", "#ff9800"],
        ["🤖 Beep boop", "#00bcd4"],
        ["Suilad", "#2e7d32"],                   // Sindarin (LOTR)
        ["Mae govannen", "#43a047"],             // Sindarin
        ["Mok'bara!", "#8d6e63"],                // Klingon-inspired
        ["Qapla'", "#b71c1c"],                   // Klingon
    ];


    const messages = [
        "Installing language pack...",
        "New greeting detected.",
        "Localization enabled.",
        "Downloading accents...",
        "Windows says hello.",
        "Accent database refreshed.",
        "Locating Linux French Language Pack...",
    ];

    let accents = [];
    let player = null;
    let falling = [];

    // gameState: "menu" | "playing" | "paused" | "gameover"
    let gameState = "menu";

    let score = 0;
    let lives = 3;

    let speed = 4;
    let timer = 0;

    let startTime = 0;
    let elapsedBeforePause = 0;

    let toast = "";
    let toastTimer = 0;

    let keys = {};

    let audio = null;

    const SPEED_BOOST_MULTIPLIER = 1.7;


    /* Konami secret */

    const konamiCode = [
        "ArrowUp",
        "ArrowUp",
        "ArrowDown",
        "ArrowDown",
        "ArrowLeft",
        "ArrowRight",
        "ArrowLeft",
        "ArrowRight",
        "b",
        "a"
    ];

    let konamiIndex = 0;
    let developerMode = false;

    document.addEventListener("keydown", e => {
        if (["ArrowLeft", "ArrowRight", "ArrowDown", "ArrowUp", "Space"].includes(e.code)) {
            e.preventDefault();
        }
        keys[e.key] = true;
        if (e.key === konamiCode[konamiIndex]) {
            konamiIndex++;
            if (konamiIndex === konamiCode.length) {
                developerMode = true;
                konamiIndex = 0;
                toast = "Developer Mode unlocked. HELLO OVERLOAD.";
                toastTimer = 220;
                beep(1400, .2);
            }
        } else {
            konamiIndex = 0;
        }
        if (e.key === "ArrowUp" && gameState === "playing") {

            const item =
                    greetings[Math.floor(Math.random() * greetings.length)];

            accents.push({

                text: item[0],
                colour: item[1],

                x: Math.random() * 650,
                y: -40,

                w: 140,
                h: 38,

                dx: Math.random() < 0.5 ? -6 : 6,
                dy: speed + 4
            });

            beep(1000, .05);
        }
        if (e.code === "Space") {
            if (gameState === "menu" || gameState === "gameover") {
                startGame();
            } else if (gameState === "playing") {
                pauseGame();
            } else if (gameState === "paused") {
                resumeGame();
            }
        }
    });

    document.addEventListener("keyup", e => {
        keys[e.key] = false;
    });

    function beep(freq, length) {
        if (!audio)
            audio = new AudioContext();
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.frequency.value = freq;
        gain.gain.value = .08;
        osc.connect(gain);
        gain.connect(audio.destination);
        osc.start();
        osc.stop(
                audio.currentTime + length
        );
    }

    function startGame() {
        if (audio)
            audio.resume();
        player = {
            x: 365,
            y: 490,
            w: 70,
            h: 80,
            hitTimer: 0
        };
        falling = [];
        accents = [];
        score = 0;
        lives = 3;
        speed = 4;
        timer = 0;
        startTime = Date.now();
        elapsedBeforePause = 0;
        toast = "";
        toastTimer = 0;
        gameState = "playing";
        beep(700, .1);
    }

    function pauseGame() {
        elapsedBeforePause = Date.now() - startTime;
        gameState = "paused";
        beep(400, .1);
    }

    function resumeGame() {
        startTime = Date.now() - elapsedBeforePause;
        gameState = "playing";
        beep(600, .1);
    }

    function spawn() {
        let item;
        if (developerMode) {
            item = [
                "HELLO",
                "#00ff88"
            ];
        } else {
            item =
                    greetings[
                            Math.floor(
                                    Math.random() * greetings.length
                            )
                            ];

        }
        falling.push({
            text: item[0],
            colour: item[1],
            x: Math.random() * 650,
            y: -40,
            w: 140,
            h: 38,
            speed: speed
        });
        beep(500, .03);
    }

    function collide(a, b) {
        return (
                a.x < b.x + b.w &&
                a.x + a.w > b.x &&
                a.y < b.y + b.h &&
                a.y + a.h > b.y
        );
    }


    function update() {
        if (gameState !== "playing")
            return;

        const boosted = !!keys["ArrowDown"];
        const boost = boosted ? SPEED_BOOST_MULTIPLIER : 1;

        score = Math.floor(
                (Date.now() - startTime) / 1000
        );
        speed =
                developerMode
                        ? 5 + score / 10
                        : 2 + score / 15;

        const effectiveSpeed = speed * boost;

        if (keys["ArrowLeft"] || keys["a"])
            player.x -= 7;
        if (keys["ArrowRight"] || keys["d"])
            player.x += 7;
        player.x = Math.max(
                0,
                Math.min(
                        730,
                        player.x
                )
        );
        timer++;
        if (timer > Math.max(15, 80 - effectiveSpeed * 5)) {
            spawn();
            timer = 0;
        }
        accents = accents.filter(a => {

            a.x += a.dx;
            a.y += a.dy;

            if (a.x <= 0 || a.x + a.w >= canvas.width)
                a.dx *= -1;

            // Destroy falling greetings
            falling = falling.filter(f => {

                if (collide(a, f)) {
                    beep(900, .03);
                    return false;
                }

                return true;
            });

            // Hit the player
            if (collide(player, a)) {

                lives--;
                player.hitTimer = 120;
                beep(180, .2);

                return false; // remove this accent after it hits
            }

            return true;
        });
        falling.forEach(x => {
            x.y += x.speed * boost;
        });
        falling = falling.filter(x => {
            if (collide(player, x)) {
                lives--;
                player.hitTimer = 120; // ~2 seconds at 60fps
                beep(180, .2);
                return false;
            }
            return x.y < 650;
        });
        accents = accents.filter(a => a.y < canvas.height + 40);
        if (player.hitTimer > 0)
            player.hitTimer--;
        if (score && score % 20 === 0 && toastTimer === 0) {
            toast =
                    messages[
                            Math.floor(
                                    Math.random() * messages.length
                            )
                            ];
            toastTimer = 150;
            beep(900, .08);
        }
        if (toastTimer > 0)
            toastTimer--;
        if (lives <= 0) {
            gameState = "gameover";
            beep(100, .4);
        }
    }


    function box(x, y, w, h, c) {
        ctx.fillStyle = c;
        ctx.beginPath();
        ctx.roundRect(
                x, y, w, h, 10
        );
        ctx.fill();
    }


    function draw() {
        ctx.clearRect(0, 0, 800, 600);

        docsBtn.style.display =
                (gameState === "paused" || gameState === "gameover")
                        ? "block"
                        : "none";

        if (gameState === "menu") {
            box(180, 220, 440, 150, "#111827");
            ctx.fillStyle = "white";
            ctx.font = "32px Segoe UI";
            ctx.fillText(
                    "WINDOW ACCENT",
                    250,
                    275
            );
            ctx.font = "18px Segoe UI";
            ctx.fillText(
                    "Dodge all the accents!",
                    285,
                    315
            );
            ctx.fillText(
                    "Press SPACE",
                    330,
                    350
            );
            return;
        }
        ctx.fillStyle = "white";
        ctx.font = "20px Segoe UI";
        ctx.fillText(
                "WINDOW ACCENT",
                25,
                35
        );
        ctx.font = "16px Segoe UI";
        ctx.fillText(
                "Score: " + score,
                680,
                35
        );
        ctx.fillText(
                "♥ ".repeat(lives),
                680,
                60
        );
        if (developerMode) {
            ctx.fillStyle = "#00ff88";
            ctx.fillText(
                    "DEVELOPER MODE",
                    25,
                    60
            );
        }
        if (keys["ArrowDown"] && gameState === "playing") {
            ctx.fillStyle = "#ffcc00";
            ctx.fillText(
                    "⚡ BOOST",
                    350,
                    35
            );
        }
        ctx.save();
        let pulseScale = 1;
        let playerColour = "#0078d4";
        if (player.hitTimer > 0) {
            const t = player.hitTimer / 120; // 1 -> 0 over 2 seconds
            pulseScale = 1 + 0.22 * Math.sin(t * Math.PI * 9) * t;
            playerColour = Math.floor(player.hitTimer / 6) % 2 === 0
                    ? "#ff3b3b"
                    : "#0078d4";
            const cx = player.x + player.w / 2;
            const cy = player.y + player.h / 2;
            ctx.translate(cx, cy);
            ctx.scale(pulseScale, pulseScale);
            ctx.translate(-cx, -cy);
        }
        // Window

        box(
                player.x,
                player.y,
                player.w,
                player.h,
                playerColour
        );

// Gloss

        ctx.fillStyle = "rgba(255,255,255,.18)";
        ctx.fillRect(
                player.x + 2,
                player.y + 2,
                player.w - 4,
                12
        );

// Title bar

        ctx.fillStyle = "#eef7ff";

        ctx.fillRect(
                player.x + 8,
                player.y + 8,
                player.w - 16,
                14
        );

// Control dots

        ctx.fillStyle = "#6baee8";

        ctx.beginPath();
        ctx.arc(player.x + 16, player.y + 15, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(player.x + 27, player.y + 15, 3, 0, Math.PI * 2);
        ctx.fill();

// Window panes

        ctx.fillStyle = "white";

        ctx.fillRect(
                player.x + 10,
                player.y + 30,
                22,
                38
        );

        ctx.fillRect(
                player.x + 38,
                player.y + 30,
                22,
                38
        );
        ctx.restore();
        accents.forEach(a => {

            box(
                    a.x,
                    a.y,
                    a.w,
                    a.h,
                    a.colour
            );

            ctx.fillStyle = "white";

            ctx.fillText(
                    a.text,
                    a.x + 10,
                    a.y + 25
            );

        });
        falling.forEach(x => {
            box(
                    x.x,
                    x.y,
                    x.w,
                    x.h,
                    x.colour
            );
            ctx.fillStyle = "white";
            ctx.fillText(
                    x.text,
                    x.x + 10,
                    x.y + 25
            );
        });
        if (toastTimer) {
            box(
                    200,
                    80,
                    400,
                    55,
                    "#1b1b1b"
            );
            ctx.fillStyle = "white";
            ctx.fillText(
                    "🪟 " + toast,
                    220,
                    115
            );
        }
        if (gameState === "paused") {
            ctx.fillStyle = "white";
            ctx.font = "30px Segoe UI";
            ctx.fillText(
                    "Paused",
                    340,
                    275
            );
            ctx.font = "18px Segoe UI";
            ctx.fillText(
                    "Press SPACE to resume",
                    290,
                    315
            );
        }
        if (gameState === "gameover") {
            ctx.fillStyle = "white";
            ctx.font = "30px Segoe UI";
            ctx.fillText(
                    "You were greeted.",
                    270,
                    275
            );
            ctx.font = "18px Segoe UI";
            ctx.fillText(
                    "Score: " + score,
                    350,
                    315
            );
            ctx.fillText(
                    "Press SPACE again",
                    300,
                    350
            );
            ctx.fillText(
                    "If you enjoyed this - consider leaving a review on Marketplace!",
                    150,
                    390
            );
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    loop();

</script>

</body>
</html>
