<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Window Accent - Dodge All The Accents</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #050b16;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-family:"Segoe UI", sans-serif;
    overflow:hidden;
}

canvas {
    background:linear-gradient(#071426,#02050a);
    border-radius:18px;
    box-shadow:0 0 40px rgba(0,120,255,.35);
}

#hint {
    position:fixed;
    bottom:15px;
    opacity:.6;
    font-size:13px;
}
</style>

</head>

<body>

<canvas id="game" width="800" height="600"></canvas>

<div id="hint">
← → Move &nbsp; | &nbsp; SPACE Start &nbsp; | &nbsp; Secret: ↑ ↑ ↓ ↓ ← → ← → B A
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");


const greetings=[
["Hello","#0078d4"],
["Bonjour","#0055a4"],
["Hola","#aa151b"],
["Hallo","#ffce00"],
["Ciao","#008c45"],
["Olá","#009c3b"],
["Sawubona","#007749"],
["Howzit","#ffb81c"],
["G'day","#00008b"],
["Xin chào","#da251d"],
["Konnichiwa","#bc002d"],
["你好","#de2910"],
["안녕하세요","#cd2e3a"],
["Merhaba","#e30a17"],
["Namaste","#ff9933"]
];


const messages=[
"Installing language pack...",
"New greeting detected.",
"Localization enabled.",
"Downloading accents...",
"Windows says hello.",
"Accent database refreshed."
];


let player=null;
let falling=[];

let running=false;

let score=0;
let lives=3;

let speed=2;
let timer=0;

let startTime=0;

let toast="";
let toastTimer=0;

let keys={};

let audio=null;


/* Konami secret */

const konamiCode=[
"ArrowUp",
"ArrowUp",
"ArrowDown",
"ArrowDown",
"ArrowLeft",
"ArrowRight",
"ArrowLeft",
"ArrowRight",
"b",
"a"
];

let konamiIndex=0;
let developerMode=false;



document.addEventListener("keydown",e=>{

    if(["ArrowLeft","ArrowRight","Space"].includes(e.code)){
        e.preventDefault();
    }


    keys[e.key]=true;


    if(e.key===konamiCode[konamiIndex]){

        konamiIndex++;

        if(konamiIndex===konamiCode.length){

            developerMode=true;

            konamiIndex=0;

            toast="Developer Mode unlocked. HELLO OVERLOAD.";

            toastTimer=220;

            beep(1400,.2);
        }

    } else {

        konamiIndex=0;

    }


    if(e.code==="Space" && !running){

        startGame();

    }

});


document.addEventListener("keyup",e=>{
    keys[e.key]=false;
});



function beep(freq,length){

    if(!audio)
        audio=new AudioContext();


    const osc=audio.createOscillator();
    const gain=audio.createGain();


    osc.frequency.value=freq;
    gain.gain.value=.08;


    osc.connect(gain);
    gain.connect(audio.destination);


    osc.start();

    osc.stop(
        audio.currentTime+length
    );

}



function startGame(){

    if(audio)
        audio.resume();


    player={
        x:365,
        y:530,
        w:70,
        h:40
    };


    falling=[];

    score=0;
    lives=3;

    speed=2;
    timer=0;

    startTime=Date.now();

    toast="";
    toastTimer=0;

    running=true;

    beep(700,.1);

}



function spawn(){

    let item;


    if(developerMode){

        item=[
            "HELLO",
            "#00ff88"
        ];

    } else {

        item=
        greetings[
            Math.floor(
                Math.random()*greetings.length
            )
        ];

    }


    falling.push({

        text:item[0],

        colour:item[1],

        x:Math.random()*650,

        y:-40,

        w:140,

        h:38,

        speed:speed

    });


    beep(500,.03);

}



function collide(a,b){

return(
a.x<b.x+b.w &&
a.x+a.w>b.x &&
a.y<b.y+b.h &&
a.y+a.h>b.y
);

}



function update(){

if(!running)
return;


score=Math.floor(
(Date.now()-startTime)/1000
);


speed =
developerMode
? 5+score/10
: 2+score/15;



if(keys["ArrowLeft"]||keys["a"])
player.x-=7;


if(keys["ArrowRight"]||keys["d"])
player.x+=7;


player.x=Math.max(
0,
Math.min(
730,
player.x
)
);



timer++;


if(timer>Math.max(15,80-speed*5)){

spawn();

timer=0;

}



falling.forEach(x=>{
x.y+=x.speed;
});



falling=falling.filter(x=>{


if(collide(player,x)){

lives--;

beep(180,.2);

return false;

}


return x.y<650;


});



if(score && score%20===0 && toastTimer===0){

toast=
messages[
Math.floor(
Math.random()*messages.length
)
];

toastTimer=150;

beep(900,.08);

}


if(toastTimer>0)
toastTimer--;



if(lives<=0){

running=false;

beep(100,.4);

}

}




function box(x,y,w,h,c){

ctx.fillStyle=c;

ctx.beginPath();

ctx.roundRect(
x,y,w,h,10
);

ctx.fill();

}




function draw(){

ctx.clearRect(0,0,800,600);



if(!player){

box(180,220,440,150,"#111827");

ctx.fillStyle="white";

ctx.font="32px Segoe UI";

ctx.fillText(
"WINDOW ACCENT",
250,
275
);


ctx.font="18px Segoe UI";

ctx.fillText(
"Dodge all the accents!",
285,
315
);

ctx.fillText(
"Press SPACE",
330,
350
);

return;

}



ctx.fillStyle="white";

ctx.font="20px Segoe UI";

ctx.fillText(
"WINDOW ACCENT",
25,
35
);


ctx.font="16px Segoe UI";

ctx.fillText(
"Score: "+score,
680,
35
);


ctx.fillText(
"♥ ".repeat(lives),
680,
60
);



if(developerMode){

ctx.fillStyle="#00ff88";

ctx.fillText(
"DEVELOPER MODE",
25,
60
);

}



box(
player.x,
player.y,
player.w,
player.h,
"#0078d4"
);


ctx.fillStyle="white";

ctx.fillRect(
player.x+10,
player.y+10,
20,
10
);

ctx.fillRect(
player.x+40,
player.y+10,
20,
10
);



falling.forEach(x=>{

box(
x.x,
x.y,
x.w,
x.h,
x.colour
);


ctx.fillStyle="white";

ctx.fillText(
x.text,
x.x+10,
x.y+25
);


});



if(toastTimer){

box(
200,
80,
400,
55,
"#1b1b1b"
);


ctx.fillStyle="white";

ctx.fillText(
"🪟 "+toast,
220,
115
);

}



if(!running){

box(
180,
220,
440,
150,
"#111827"
);


ctx.fillStyle="white";

ctx.font="30px Segoe UI";

ctx.fillText(
"You were greeted.",
270,
275
);


ctx.font="18px Segoe UI";

ctx.fillText(
"Score: "+score,
350,
315
);


ctx.fillText(
"Press SPACE again",
300,
350
);

}

}



function loop(){

update();

draw();

requestAnimationFrame(loop);

}


loop();


</script>

</body>
</html>
