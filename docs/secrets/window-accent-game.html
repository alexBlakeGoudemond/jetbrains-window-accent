<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Window Accent - Dodge All The Accents</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #050b16;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: "Segoe UI", sans-serif;
            overflow: hidden;
        }

        #gameWrap {
            position: relative;
        }

        canvas {
            background: linear-gradient(#071426, #02050a);
            border-radius: 18px;
            box-shadow: 0 0 40px rgba(0, 120, 255, .35);
            display: block;
        }

        #hint {
            position: fixed;
            bottom: 15px;
            opacity: .6;
            font-size: 13px;
        }

        #docsBtn {
            display: none;
            position: absolute;
            left: 50%;
            top: 430px;
            transform: translateX(-50%);
            padding: 10px 20px;
            font-size: 15px;
            font-family: "Segoe UI", sans-serif;
            color: white;
            background: #0078d4;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 120, 255, .5);
        }

        #docsBtn:hover {
            background: #1a8ae6;
        }

        #mobileControls {
            display: none;
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            justify-content: space-between;
            align-items: flex-end;
            gap: 12px;
            background: linear-gradient(to top, rgba(2,5,10,.85), rgba(2,5,10,0));
            z-index: 10;
            touch-action: none;
            user-select: none;
        }

        .mobileCluster {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .mobileBtn {
            width: 58px;
            height: 58px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,.15);
            background: rgba(0,120,212,.35);
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 12px rgba(0,120,255,.35);
            -webkit-tap-highlight-color: transparent;
        }

        .mobileBtn:active {
            background: rgba(26,138,230,.6);
        }

        #mobileSpaceBtn {
            width: 90px;
            font-size: 14px;
            font-weight: bold;
        }

        @media (max-width: 850px) {
            canvas {
                width: 96vw;
                height: auto;
            }
        }
    </style>

</head>

<body>

<div id="gameWrap">
    <canvas id="game" width="800" height="600"></canvas>
    <button id="docsBtn">📖 Back to Docs</button>
</div>

<div id="hint">
    ← → Move &nbsp; | &nbsp; ↓ Speed Boost &nbsp; | &nbsp; SPACE Start / Pause &nbsp; | &nbsp; Secret: ↑ ↑ ↓ ↓ ← → ← → B
    A
</div>

<div id="mobileControls">
    <div class="mobileCluster">
        <button class="mobileBtn" id="mobileLeftBtn" aria-label="Move left">◀</button>
        <button class="mobileBtn" id="mobileDownBtn" aria-label="Speed boost">⚡</button>
        <button class="mobileBtn" id="mobileRightBtn" aria-label="Move right">▶</button>
    </div>
    <div class="mobileCluster">
        <button class="mobileBtn" id="mobileUpBtn" aria-label="Throw accent">▲</button>
        <button class="mobileBtn" id="mobileSpaceBtn" aria-label="Start or pause">START / PAUSE</button>
    </div>
</div>

<script>

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const docsBtn = document.getElementById("docsBtn");
    const DOCS_URL = "https://alexblakegoudemond.github.io/jetbrains-window-accent/contributing/";

    docsBtn.addEventListener("click", () => {
        window.location.href = DOCS_URL;
    });

    const greetings = [
        ["Hej", "#006aa7"],             // Swedish
        ["Hei", "#00205b"],             // Norwegian
        ["Hei", "#1e50ae"],             // Finnish
        ["Hej", "#c60c30"],             // Danish
        ["Ahoj", "#11457e"],            // Czech / Slovak
        ["Zdravo", "#0c4076"],          // Serbian / Croatian
        ["Bok", "#ff0000"],             // Croatian (informal)
        ["Szia", "#436f4d"],            // Hungarian
        ["Cześć", "#dc143c"],           // Polish
        ["Bună", "#002b7f"],            // Romanian
        ["Привет", "#aaaaaa"],          // Russian
        ["Здравей", "#00966e"],         // Bulgarian
        ["Γεια σου", "#0d5eaf"],        // Greek
        ["שלום", "#0038b8"],            // Hebrew
        ["السلام عليكم", "#006c35"],    // Arabic
        ["سلام", "#239f40"],            // Persian
        ["ਸਤ ਸ੍ਰੀ ਅਕਾਲ", "#ff9933"],     // Punjabi
        ["Kem cho?", "#138808"],        // Gujarati
        ["Vanakkam", "#ff9933"],        // Tamil
        ["Ayubowan", "#8d153a"],        // Sinhala
        ["Halo", "#ce1126"],            // Indonesian
        ["Kamusta", "#0038a8"],         // Filipino
        ["Sawasdee", "#2d2a4a"],        // Thai
        ["Mingalaba", "#34b233"],       // Burmese
        ["Chào bạn", "#da251d"],        // Vietnamese (Hi, friend)
        ["Habari", "#1eb53a"],          // Swahili
        ["Jambo", "#000000"],           // Swahili (tourist-friendly)
        ["Molo", "#007749"],            // isiXhosa
        ["Dumela", "#75aadb"],          // Setswana / Sesotho
        ["Avuxeni", "#009739"],         // Xitsonga
        ["Thobela", "#007a4d"],         // Sepedi
        ["Lotjhani", "#00a859"],        // siSwati
        ["Sanibonani", "#007749"],      // isiZulu (plural)
        ["Yebo", "#ffb81c"],            // isiZulu ("Yes", often used conversationally)
        ["Shalom", "#0038b8"],          // Hebrew greeting/farewell
        ["Aloha", "#c8102e"],           // Hawaiian
        ["Kia ora", "#00247d"],         // Māori
        ["Talofa", "#002b7f"],          // Samoan
        ["Bula", "#68bfe5"],            // Fijian
        ["Ia ora na", "#dc143c"],       // Tahitian
        ["Tēnā koe", "#00247d"],        // Māori (formal)
        ["Kumusta", "#0038a8"],         // Filipino (informal)
        ["Salam", "#239f40"],           // Persian (informal)
        ["Namaste", "#ff9933"],         // Hindi
        ["Salaam", "#006c35"],          // Arabic (informal)
        ["Sannu", "#138808"],           // Hausa
        ["Selamat siang", "#ce1126"],   // Indonesian (Good afternoon)
        // Fun ones below
        ["Hello, World!", "#4caf50"],
        ["Ahoy!", "#1565c0"],
        ["👋", "#ff9800"],
        ["🤖 Beep boop", "#00bcd4"],
        ["Suilad", "#2e7d32"],                   // Sindarin (LOTR)
        ["Mae govannen", "#43a047"],             // Sindarin
        ["Mok'bara!", "#8d6e63"],                // Klingon-inspired
        ["Qapla'", "#b71c1c"],                   // Klingon
    ];


    const messages = [
        "Installing language pack...",
        "New greeting detected.",
        "Localization enabled.",
        "Downloading accents...",
        "Windows says hello.",
        "Accent database refreshed.",
        "Locating Linux French Language Pack...",
    ];

    let accentsFallingDiagonally = [];
    let player = null;
    let accentsFallingVertically = [];
    // gameState: "menu" | "playing" | "paused" | "gameover"
    let gameState = "menu";
    let score = 0;
    let lives = 3;
    let speed = 4;
    let timer = 0;
    let startTime = 0;
    let elapsedBeforePause = 0;
    let toast = "";
    let toastTimer = 0;
    let keysPressed = {};
    let audio = null;
    const SPEED_BOOST_MULTIPLIER = 4;

    /* Konami secret - The classic Konami Code sequence that unlocks developer mode */
    const konamiCode = [
        "ArrowUp",
        "ArrowUp",
        "ArrowDown",
        "ArrowDown",
        "ArrowLeft",
        "ArrowRight",
        "ArrowLeft",
        "ArrowRight",
        "b",
        "a"
    ];

    let konamiIndex = 0;
    let developerMode = false;

    function startGame() {
        if (audio) {
            audio.resume();
        }
        player = {
            x: 365,
            y: 490,
            w: 70,
            h: 80,
            hitTimer: 0
        };
        accentsFallingVertically = [];
        accentsFallingDiagonally = [];
        score = 0;
        lives = 3;
        speed = 4;
        timer = 0;
        startTime = Date.now();
        elapsedBeforePause = 0;
        toast = "";
        toastTimer = 0;
        gameState = "playing";
        startSound();
    }

    function gameOverSound() {
        beep(100, .4);
    }

    function hitSound() {
        beep(180, .2);
    }

    function pauseSound() {
        beep(400, .1);
    }

    function resumeSound() {
        beep(600, .1);
    }

    function startSound() {
        beep(700, .1);
    }

    function collisionSound() {
        beep(900, .03);
    }

    function scoreSoundVerticalAccent() {
        beep(700, .04);
    }

    function scoreDiagonalAccentSound() {
        beep(900, .05);
    }

    function fallingAccentDiagonallySound() {
        beep(1000, .05);
    }

    function fallingAccentVerticallySound() {
        beep(500, .03);
    }

    function playConfirmationSound() {
        beep(1400, .2);
    }

    function beep(freq, length) {
        if (!audio) {
            audio = new AudioContext();
        }
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.frequency.value = freq;
        gain.gain.value = .08;
        osc.connect(gain);
        gain.connect(audio.destination);
        osc.start();
        osc.stop(audio.currentTime + length);
    }

    function getRandomGreeting() {
        return greetings[Math.floor(Math.random() * greetings.length)];
    }

    function handleGameStateTransition(event) {
        if (event.code !== "Space") {
            return;
        }
        if (gameState === "menu" || gameState === "gameover") {
            startGame();
        } else if (gameState === "playing") {
            pauseGame();
        } else if (gameState === "paused") {
            resumeGame();
        }
    }

    function pauseGame() {
        elapsedBeforePause = Date.now() - startTime;
        gameState = "paused";
        pauseSound();
    }

    function resumeGame() {
        startTime = Date.now() - elapsedBeforePause;
        gameState = "playing";
        resumeSound();
    }

    function spawnAccentFallingDiagonally(event) {
        if (!(event.key === "ArrowUp" && gameState === "playing")) {
            return;
        }
        const item = getRandomGreeting();
        accentsFallingDiagonally.push({
            text: item[0],
            colour: item[1],
            x: Math.random() * 650,
            y: -40,
            w: 140,
            h: 38,
            dx: Math.random() < 0.5 ? -6 : 6,
            dy: speed + 4
        });
        fallingAccentDiagonallySound();
    }

    document.addEventListener("keydown", event => {
        // Prevent default browser behavior (e.g. page scrolling) for game control keys
        if (["ArrowLeft", "ArrowRight", "ArrowDown", "ArrowUp", "Space"].includes(event.code)) {
            event.preventDefault();
        }
        keysPressed[event.key] = true;
        // Check if the pressed key matches the next expected key in the Konami code
        if (event.key === konamiCode[konamiIndex]) {
            konamiIndex++;
            if (konamiIndex === konamiCode.length) {
                developerMode = true;
                konamiIndex = 0;
                toast = "Developer Mode unlocked. HELLO OVERLOAD.";
                toastTimer = 220;
                playConfirmationSound();
            }
        } else {
            konamiIndex = 0;
        }
        spawnAccentFallingDiagonally(event);
        handleGameStateTransition(event);
    });

    document.addEventListener("keyup", e => {
        keysPressed[e.key] = false;
    });

    /* ---------- Mobile detection & touch controls ---------- */

    function isMobileDevice() {
        const uaMobile = /Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(navigator.userAgent);
        const hasTouch = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;
        const coarsePointer = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
        return uaMobile || (hasTouch && coarsePointer);
    }

    function setupMobileControls() {
        const mobileControls = document.getElementById("mobileControls");
        if (!isMobileDevice()) {
            return;
        }
        mobileControls.style.display = "flex";

        const leftBtn = document.getElementById("mobileLeftBtn");
        const rightBtn = document.getElementById("mobileRightBtn");
        const downBtn = document.getElementById("mobileDownBtn");
        const upBtn = document.getElementById("mobileUpBtn");
        const spaceBtn = document.getElementById("mobileSpaceBtn");

        // Hold-down buttons: mirror keysPressed exactly like the keyboard handler does
        function bindHold(btn, key) {
            const press = evt => {
                evt.preventDefault();
                keysPressed[key] = true;
            };
            const release = evt => {
                evt.preventDefault();
                keysPressed[key] = false;
            };
            btn.addEventListener("touchstart", press, {passive: false});
            btn.addEventListener("touchend", release, {passive: false});
            btn.addEventListener("touchcancel", release, {passive: false});
            // Fallback so the buttons also work with a mouse (e.g. touch emulation)
            btn.addEventListener("mousedown", press);
            btn.addEventListener("mouseup", release);
            btn.addEventListener("mouseleave", release);
        }

        bindHold(leftBtn, "ArrowLeft");
        bindHold(rightBtn, "ArrowRight");
        bindHold(downBtn, "ArrowDown");

        // One-shot buttons: trigger the same functions the keydown handler calls
        const throwAccent = evt => {
            evt.preventDefault();
            spawnAccentFallingDiagonally({key: "ArrowUp"});
        };
        upBtn.addEventListener("touchstart", throwAccent, {passive: false});
        upBtn.addEventListener("mousedown", throwAccent);

        const toggleState = evt => {
            evt.preventDefault();
            if (audio) {
                audio.resume();
            }
            handleGameStateTransition({code: "Space"});
        };
        spaceBtn.addEventListener("touchstart", toggleState, {passive: false});
        spaceBtn.addEventListener("mousedown", toggleState);
    }

    setupMobileControls();

    function spawnFallingAccentVertically() {
        let item;
        if (developerMode) {
            item = ["HELLO", "#ffe600"];
        } else {
            item = getRandomGreeting();
        }
        accentsFallingVertically.push({
            text: item[0],
            colour: item[1],
            x: Math.random() * 650,
            y: -40,
            w: 140,
            h: 38,
            speed: speed
        });
        fallingAccentVerticallySound();
    }

    function collide(a, b) {
        return (
                a.x < b.x + b.w &&
                a.x + a.w > b.x &&
                a.y < b.y + b.h &&
                a.y + a.h > b.y
        );
    }

    function handlePlayMovementHorizontally() {
        if (keysPressed["ArrowLeft"] || keysPressed["a"]) {
            player.x -= 7;
        }
        if (keysPressed["ArrowRight"] || keysPressed["d"]) {
            player.x += 7;
        }
        player.x = Math.max(0, Math.min(730, player.x));
    }

    function increaseFallingAccentSpeed(effectiveSpeed) {
        if (timer > Math.max(15, 40 - effectiveSpeed * 5)) {
            spawnFallingAccentVertically();
            timer = 0;
        }
    }

    function destroyFallingGreeting(a) {
        accentsFallingVertically = accentsFallingVertically.filter(f => {
            if (collide(a, f)) {
                collisionSound();
                return false;
            }
            return true;
        });
    }

    function updateFallingAccentDiagonally() {
        accentsFallingDiagonally = accentsFallingDiagonally.filter(a => {
            a.x += a.dx;
            a.y += a.dy;
            if (a.x <= 0 || a.x + a.w >= canvas.width) {
                a.dx *= -1;
            }
            destroyFallingGreeting(a);
            // Hit the player
            if (collide(player, a)) {
                lives--;
                player.hitTimer = 120;
                hitSound();
                return false; // remove this accent after it hits
            }
            // Reach the bottom
            if (a.y >= canvas.height) {
                score += 3;
                scoreDiagonalAccentSound();
                return false;
            }
            return true;
        });
    }

    function updateFallingAccentVertically(boost) {
        accentsFallingVertically.forEach(x => {
            x.y += x.speed * boost;
        });
        accentsFallingVertically = accentsFallingVertically.filter(x => {
            if (collide(player, x)) {
                lives--;
                player.hitTimer = 120;
                hitSound();
                return false;
            }
            // Reach the bottom
            if (x.y >= canvas.height) {
                score += 1;
                scoreSoundVerticalAccent();
                return false;
            }
            return true;
        });
    }

    function showGameNotification(elapsed) {
        if (elapsed && elapsed % 20 === 0 && toastTimer === 0) {
            toast = messages[Math.floor(Math.random() * messages.length)];
            toastTimer = 150;
            beep(900, .08);
        }
    }

    function getBoost() {
        const boosted = !!keysPressed["ArrowDown"];
        return boosted ? SPEED_BOOST_MULTIPLIER : 1;
    }

    function update() {
        if (gameState !== "playing") {
            return;
        }
        const boost = getBoost();
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        speed = developerMode ? (5 + elapsed / 10) : (2 + elapsed / 15);
        const effectiveSpeed = speed * boost;
        handlePlayMovementHorizontally();

        timer++;
        increaseFallingAccentSpeed(effectiveSpeed);

        updateFallingAccentDiagonally();
        updateFallingAccentVertically(boost);

        if (player.hitTimer > 0) {
            player.hitTimer--;
        }

        showGameNotification(elapsed);
        if (toastTimer > 0) {
            toastTimer--;
        }
        if (lives <= 0) {
            gameState = "gameover";
            gameOverSound();
        }
    }

    function drawGameBox(x, y, w, h, c) {
        ctx.fillStyle = c;
        ctx.beginPath();
        ctx.roundRect(
                x, y, w, h, 10
        );
        ctx.fill();
    }

    function clearGameBoard() {
        ctx.clearRect(0, 0, 800, 600);
    }

    function showMainMenu() {
        drawGameBox(180, 220, 440, 150, "#111827");
        ctx.fillStyle = "white";
        ctx.font = "32px Segoe UI";
        ctx.fillText(
                "WINDOW ACCENT",
                250,
                275
        );
        ctx.font = "18px Segoe UI";
        ctx.fillText(
                "Dodge all the accents!",
                285,
                315
        );
        ctx.fillText(
                "Press SPACE",
                330,
                350
        );
    }

    function showHeadsUpDisplay() {
        ctx.fillStyle = "white";
        ctx.font = "20px Segoe UI";
        ctx.fillText(
                "WINDOW ACCENT",
                25,
                35
        );
        ctx.font = "16px Segoe UI";
        ctx.fillText(
                "Score: " + score,
                680,
                35
        );
        ctx.fillText(
                "♥ ".repeat(lives),
                680,
                60
        );
    }

    function showDeveloperMode() {
        if (!developerMode) {
            return;
        }
        ctx.fillStyle = "#00ff88";
        ctx.fillText(
                "DEVELOPER MODE",
                25,
                60
        );
    }

    function showBoostIndicator() {
        if (!(keysPressed["ArrowDown"] && gameState === "playing")) {
            return;
        }
        ctx.fillStyle = "#ffcc00";
        ctx.fillText(
                "⚡ BOOST",
                350,
                35
        );
    }

    function updateColourToCollisionAnimation(pulseScale, playerColour) {
        if (player.hitTimer > 0) {
            const t = player.hitTimer / 120; // 1 -> 0 over 2 seconds
            pulseScale = 1 + 0.22 * Math.sin(t * Math.PI * 9) * t;
            playerColour = Math.floor(player.hitTimer / 6) % 2 === 0
                    ? "#ff3b3b"
                    : "#0078d4";
            const cx = player.x + player.w / 2;
            const cy = player.y + player.h / 2;
            ctx.translate(cx, cy);
            ctx.scale(pulseScale, pulseScale);
            ctx.translate(-cx, -cy);
        }
        return playerColour;
    }

    function drawPlayerGameOverGradient(x, y, w, h) {
        // Diagonal gradient from top-left to bottom-right (i.e. towards the RHS)
        const gradient = ctx.createLinearGradient(x, y, x + w, y + h);
        gradient.addColorStop(0, "#38d74d");   // green
        gradient.addColorStop(0.5, "#4caaf5"); // blue
        gradient.addColorStop(1, "#ff0000");   // pink
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, 10);
        ctx.fill();
    }

    function drawPlayer() {
        ctx.save();
        let pulseScale = 1;
        let playerColour = "#0078d4";
        playerColour = updateColourToCollisionAnimation(pulseScale, playerColour);

        if (gameState === "gameover") {
            drawPlayerGameOverGradient(player.x, player.y, player.w, player.h);
        } else {
            drawGameBox(
                    player.x,
                    player.y,
                    player.w,
                    player.h,
                    playerColour
            );
        }

        // Soft highlight
        ctx.fillStyle = "rgba(255,255,255,.12)";
        ctx.fillRect(
                player.x + 3,
                player.y + 3,
                player.w - 6,
                8
        );

        // Four panes
        const margin = 10;
        const gap = 6;
        const paneW = (player.w - margin * 2 - gap) / 2;
        const paneH = (player.h - margin * 2 - gap) / 2;
        ctx.fillStyle = "white";
        ctx.fillRect(
                player.x + margin,
                player.y + margin,
                paneW,
                paneH
        );
        ctx.fillRect(
                player.x + margin + paneW + gap,
                player.y + margin,
                paneW,
                paneH
        );
        ctx.fillRect(
                player.x + margin,
                player.y + margin + paneH + gap,
                paneW,
                paneH
        );
        ctx.fillRect(
                player.x + margin + paneW + gap,
                player.y + margin + paneH + gap,
                paneW,
                paneH
        );
        ctx.restore();
    }

    function drawAccentFallingDiagonally() {
        accentsFallingDiagonally.forEach(a => {
            drawGameBox(
                    a.x,
                    a.y,
                    a.w,
                    a.h,
                    a.colour
            );
            ctx.fillStyle = "white";
            ctx.fillText(
                    a.text,
                    a.x + 10,
                    a.y + 25
            );
        });
    }

    function drawAccentFallingVertically() {
        accentsFallingVertically.forEach(x => {
            drawGameBox(
                    x.x,
                    x.y,
                    x.w,
                    x.h,
                    x.colour
            );
            ctx.fillStyle = "white";
            ctx.fillText(
                    x.text,
                    x.x + 10,
                    x.y + 25
            );
        });
    }

    function drawGameNotification() {
        if (toastTimer) {
            drawGameBox(
                    200,
                    80,
                    400,
                    55,
                    "#1b1b1b"
            );
            ctx.fillStyle = "white";
            ctx.fillText(
                    "🪟 " + toast,
                    220,
                    115
            );
        }
    }

    function showPausedMenu() {
        ctx.fillStyle = "white";
        ctx.font = "30px Segoe UI";
        ctx.fillText(
                "Paused",
                340,
                275
        );
        ctx.font = "18px Segoe UI";
        ctx.fillText(
                "Press SPACE to resume",
                290,
                315
        );
    }

    function showGameOverMenu() {
        drawGameBox(120, 230, 560, 190, "#111827");

        ctx.fillStyle = "white";
        ctx.font = "30px Segoe UI";
        ctx.fillText(
                "You were greeted.",
                270,
                275
        );
        ctx.font = "18px Segoe UI";
        ctx.fillText(
                "Score: " + score,
                350,
                315
        );
        ctx.fillText(
                "Press SPACE again",
                300,
                350
        );
        ctx.fillText(
                "If you enjoyed this - consider leaving a review on Marketplace!",
                150,
                390
        );
    }

    function draw() {
        clearGameBoard();
        docsBtn.style.display = (gameState === "paused" || gameState === "gameover") ? "block" : "none";

        if (gameState === "menu") {
            showMainMenu();
            return;
        }
        showHeadsUpDisplay();
        showDeveloperMode();
        showBoostIndicator();

        drawPlayer();

        drawAccentFallingDiagonally();
        drawAccentFallingVertically();
        drawGameNotification();
        if (gameState === "paused") {
            showPausedMenu();
        }
        if (gameState === "gameover") {
            showGameOverMenu();
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    loop();

</script>

</body>
</html>
